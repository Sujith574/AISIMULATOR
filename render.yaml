services:
  # ─────────────────────────────────────────────
  # BACKEND: Express + TypeScript API
  # Render auto-sets PORT env var (usually 10000).
  # The backend reads process.env.PORT — DO NOT override PORT here.
  # ─────────────────────────────────────────────
  - type: web
    name: aisimulator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROVIDER_MODE
        value: local
      - key: JWT_SECRET
        generateValue: true         # Render auto-generates a secure random value
      - key: GROQ_API_KEY
        sync: false                 # Set manually in Render dashboard
      - key: EMAIL_USER
        sync: false                 # Set manually in Render dashboard
      - key: EMAIL_APP_PASSWORD
        sync: false                 # Set manually in Render dashboard
      - key: EMAIL_FROM_NAME
        value: Future Self Simulator

  # ─────────────────────────────────────────────
  # FRONTEND: Next.js (standalone output)
  # Render auto-sets PORT. HOSTNAME=0.0.0.0 ensures
  # the server binds to all interfaces (not just localhost).
  # NEXT_PUBLIC_API_URL is baked in at BUILD TIME — must be set here.
  # ─────────────────────────────────────────────
  - type: web
    name: aisimulator-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_URL
        # This URL is embedded into the JS bundle at build time.
        # It MUST match your deployed backend Render URL exactly.
        value: https://aisimulator-backend.onrender.com/api
