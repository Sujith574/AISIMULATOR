services:
  # ─────────────────────────────────────────────
  # BACKEND: Express + TypeScript API
  # Render auto-sets PORT env var (usually 10000).
  # The backend reads process.env.PORT — DO NOT override PORT here.
  # ─────────────────────────────────────────────
  - type: web
    name: aisimulator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROVIDER_MODE
        value: local
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM_NAME
        value: Future Self Simulator

  # ─────────────────────────────────────────────
  # FRONTEND: Next.js
  # Uses regular `next start` (NOT standalone) so that
  # .next/static/ assets (CSS, JS) are served correctly.
  # NEXT_PUBLIC_API_URL is baked in at BUILD TIME.
  # ─────────────────────────────────────────────
  - type: web
    name: aisimulator-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        # Baked into JS bundle at build time — must match backend Render URL.
        value: https://aisimulator-backend.onrender.com/api
