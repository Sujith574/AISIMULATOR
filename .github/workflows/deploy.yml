name: Build & Deploy Future Self Simulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test-build:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Build TypeScript Project
        run: |
          cd backend
          npm run build

  frontend-test-build:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Compile and Build Next.js
        run: |
          cd frontend
          npm run build
        env:
          # Must be set at build-time for Next.js NEXT_PUBLIC_* vars to be embedded.
          # Replace with your actual Render backend URL.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://aisimulator-backend.onrender.com/api' }}
